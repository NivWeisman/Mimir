name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo check
        run: cargo check --workspace

      - name: cargo test
        # Tests marked #[ignore] (e.g. example_riscv_dv_toml_loads_clean,
        # example_ibex_toml_loads_clean) depend on locally cloned repos under
        # examples/ that are gitignored and not present in CI. Cargo skips
        # #[ignore]-d tests by default, so no extra flag is needed.
        # To run them locally after cloning the repos:
        #   cargo test -p mimir-server -- --ignored example_
        run: cargo test --workspace

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
